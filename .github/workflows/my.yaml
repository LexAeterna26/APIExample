name: 'test APIExample'
on: [push]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Begin
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: 'Pipfile'
      - name: Install pipenv
        run: python -m pip install pipenv
      - name: PipenvLock
        run: pipenv lock
      - name: PipenvSync
        run: pipenv sync
      - name: Start tests
        run: pipenv run python -m pytest main_tests.py